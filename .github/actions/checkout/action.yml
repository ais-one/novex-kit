name: Checkout
description: Checkout the repository. Defaults to full history (fetch-depth 0) required by diff-based actions.

inputs:
  ref:
    description: Branch, tag, or SHA to check out. Defaults to the ref that triggered the workflow.
    required: false
    default: ''
  fetch-depth:
    description: Number of commits to fetch. 0 fetches full history.
    required: false
    default: '0'
  token:
    description: Personal access token for checkout. Defaults to the built-in GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        token: ${{ inputs.token }}
